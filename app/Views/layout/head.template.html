<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="{{ $description }}" />
<meta name="keywords" content="{{ $keywords }}" />

<meta property="og:title" content="{% if (isset($title)) %} {{ $title . ' -' }} {% end_if %} SigmaPHP Framework" />
<meta property="og:description" content="{{ $description }}" />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://sigmaphp.com" />
<meta property="og:site_name" content="SigmaPHP" />
<meta property="og:image" content="{% asset('assets/images/SigmaPHP-Logo.png') %}" />

<meta name="twitter:title" content="{% if (isset($title)) %} {{ $title . ' -' }} {% end_if %} SigmaPHP Framework" />
<meta name="twitter:description" content="{{ $description }}" />
<meta name="twitter:card" content="{% asset('assets/images/SigmaPHP-Logo.png') %}" />
<meta name="twitter:image" content="{% asset('assets/images/SigmaPHP-Logo.png') %}" />
<meta name="twitter:site" content="@sigmaphp" />

<link rel="canonical" href="{% current() %}" />

{% if (env('APP_ENV') == 'production') %}
<link rel="stylesheet" href="https://sigmaphp.com/assets/css/style.min.css">
{% else %}
<link rel="stylesheet" href="{% asset('assets/css/style.css') %}">
{% end_if %}

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/tomorrow-night-bright.min.css">

<link rel="shortcut icon" href="{% asset('assets/images/SigmaPHP-Logo.png') %}" type="image/x-icon">

<title>{% if (isset($title)) %}{{ $title . ' - ' }}{% end_if %}SigmaPHP Framework</title>
